name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: release-${{ github.repository }}
  cancel-in-progress: false

jobs:
  classify:
    runs-on: ubuntu-latest
    outputs:
      release_kind: ${{ steps.release_tag.outputs.release_kind }}
      npm_publish: ${{ steps.release_tag.outputs.npm_publish }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7
        with:
          node-version: '24'
      - name: Classify release tag
        id: release_tag
        run: |
          PKG_VERSION=$(node -p "require('./package.json').version")
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          IFS='.' read -r MAJOR MINOR _ <<< "$PKG_VERSION"
          if [[ "$GITHUB_REF" != refs/tags/v* ]]; then
            echo "::error::Release workflow must run from an accepted immutable tag or alias; got $GITHUB_REF; expected v$PKG_VERSION, v$MAJOR.$MINOR, or v$MAJOR"
            exit 1
          fi
          if [ "$TAG_VERSION" = "$MAJOR" ] || [ "$TAG_VERSION" = "$MAJOR.$MINOR" ]; then
            echo "release_kind=alias" >> "$GITHUB_OUTPUT"
            echo "npm_publish=false" >> "$GITHUB_OUTPUT"
            echo "::notice::Tag v$TAG_VERSION is a rolling alias; no publication work will run."
            exit 0
          fi
          if [ "$TAG_VERSION" != "$PKG_VERSION" ]; then
            echo "::error::Tag $GITHUB_REF_NAME does not match package version $PKG_VERSION; expected v$PKG_VERSION, v$MAJOR.$MINOR, or v$MAJOR"
            exit 1
          fi
          git fetch --depth=1 origin main --no-tags
          TAG_COMMIT=$(git rev-parse 'HEAD^{commit}')
          MAIN_COMMIT=$(git rev-parse 'origin/main^{commit}')
          if [ "$TAG_COMMIT" != "$MAIN_COMMIT" ]; then
            echo "::error::Release tag commit differs from protected origin/main"
            exit 1
          fi
          echo "release_kind=immutable" >> "$GITHUB_OUTPUT"
          echo "npm_publish=true" >> "$GITHUB_OUTPUT"

  verify-package:
    needs: classify
    if: ${{ needs.classify.outputs.release_kind == 'immutable' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7
        with:
          node-version: '24'
          cache: npm
          registry-url: 'https://registry.npmjs.org'
      - run: npm ci
      - run: npm run bundle
      - name: Install actionlint
        run: bash <(curl -sSfL https://raw.githubusercontent.com/rhysd/actionlint/main/scripts/download-actionlint.bash) 1.7.11 "$RUNNER_TEMP"
      - name: Run gates
        run: |
          set -uo pipefail
          declare -A pid=() result=()
          names=(lint typecheck test dist actionlint)
          MAX_PARALLEL_GATES=2
          ACTIONLINT_BIN="$RUNNER_TEMP/actionlint"
          finish_one() {
            local finished_pid status n
            if wait -n -p finished_pid "${pid[@]}"; then status=0; else status=$?; fi
            for n in "${!pid[@]}"; do
              if [ "${pid[$n]}" = "$finished_pid" ]; then
                result[$n]=$status
                unset 'pid[$n]'
                return
              fi
            done
          }
          run() {
            while [ "${#pid[@]}" -ge "$MAX_PARALLEL_GATES" ]; do finish_one; done
            local n=$1
            shift
            ( "$@" ) >"$n.log" 2>&1 & pid[$n]=$!
          }
          run lint npm run lint
          run typecheck npm run typecheck
          run test npm test
          run dist npm run verify:dist:assert
          run actionlint "$ACTIONLINT_BIN"
          while [ "${#pid[@]}" -gt 0 ]; do finish_one; done
          fail=0
          for n in "${names[@]}"; do
            if [ "${result[$n]}" -eq 0 ]; then echo "gate:$n=pass"; else echo "gate:$n=fail"; fail=1; fi
            cat "$n.log"
          done
          exit $fail
      - name: Pack release artifact
        run: |
          mkdir release-artifacts
          npm pack --pack-destination release-artifacts
          mv release-artifacts/*.tgz release-artifacts/release.tgz
          node --input-type=module -e 'import { createHash } from "node:crypto"; import { readFileSync, writeFileSync } from "node:fs"; const file="release-artifacts/release.tgz"; const pkg=JSON.parse(readFileSync("package.json")); const sha256=createHash("sha256").update(readFileSync(file)).digest("hex"); writeFileSync("release-artifacts/release-manifest.json", JSON.stringify({schema_version:1,repository:process.env.GITHUB_REPOSITORY,commit_sha:process.env.GITHUB_SHA,tag:process.env.GITHUB_REF_NAME,package_name:pkg.name,package_version:pkg.version,artifacts:[{path:"release.tgz",sha256}]}, null, 2));'
          (cd release-artifacts && node ../scripts/verify-release-artifacts.mjs)
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: release-${{ github.run_id }}-${{ github.run_attempt }}
          path: |
            release-artifacts/release.tgz
            release-artifacts/release-manifest.json

  publish:
    needs: [classify, verify-package]
    if: ${{ needs.classify.outputs.release_kind == 'immutable' }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
    steps:
      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: release-${{ github.run_id }}-${{ github.run_attempt }}
          path: release-artifacts
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7
        with:
          node-version: '24'
          registry-url: 'https://registry.npmjs.org'
      - name: Verify release artifacts
        working-directory: release-artifacts
        run: |
          tar -xOf release.tgz package/scripts/verify-release-artifacts.mjs > "$RUNNER_TEMP/verify-release-artifacts.mjs"
          node "$RUNNER_TEMP/verify-release-artifacts.mjs"
      - name: Publish or verify npm package identity
        working-directory: release-artifacts
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          NAME=$(node -e 'const {execFileSync}=require("node:child_process"); console.log(JSON.parse(execFileSync("tar", ["-xOf", "release.tgz", "package/package.json"], {encoding:"utf8"})).name)')
          VERSION=$(node -e 'const {execFileSync}=require("node:child_process"); console.log(JSON.parse(execFileSync("tar", ["-xOf", "release.tgz", "package/package.json"], {encoding:"utf8"})).version)')
          set +e
          npm view "$NAME@$VERSION" dist.integrity >/tmp/npm-integrity 2>/tmp/npm-view.err
          NPM_VIEW_STATUS=$?
          set -e
          VERIFIER="$RUNNER_TEMP/verify-release-artifacts.mjs" NPM_VIEW_STATUS="$NPM_VIEW_STATUS" node --input-type=module <<'NODE'
          import { readFileSync } from 'node:fs';
          import { spawnSync } from 'node:child_process';
          import { pathToFileURL } from 'node:url';

          const status = Number(process.env.NPM_VIEW_STATUS);
          const errText = readFileSync('/tmp/npm-view.err', 'utf8');
          const m = await import(pathToFileURL(process.env.VERIFIER).href);
          if (status === 0) {
            const published = readFileSync('/tmp/npm-integrity', 'utf8').trim();
            m.verifyNpmSri('release.tgz', published);
            console.log('::notice::npm version already published with matching integrity');
            process.exit(0);
          }
          if (!m.isExplicitNpmE404(errText)) {
            console.error('::error::npm view failed with a non-E404 error; refusing to publish');
            process.exit(1);
          }
          const publish = spawnSync(
            'npm',
            ['publish', './release.tgz', '--provenance', '--access', 'public'],
            { stdio: 'inherit', env: process.env }
          );
          process.exit(publish.status === 0 ? 0 : (publish.status ?? 1));
          NODE
      - name: Publish GitHub release
        uses: softprops/action-gh-release@3d0d9888cb7fd7b750713d6e236d1fcb99157228 # v3.0.2
        with:
          generate_release_notes: true
          files: release-artifacts/release.tgz

  advance-rolling-aliases:
    needs: [classify, publish]
    if: ${{ needs.classify.outputs.release_kind == 'immutable' }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          fetch-depth: 1
      - name: Advance non-regressing major and minor aliases
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          IFS='.' read -r MAJOR MINOR _ <<< "$VERSION"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          FROZEN=$(MAJOR="$MAJOR" node --input-type=module -e 'import { isFrozenAliasMajor } from "./scripts/verify-release-artifacts.mjs"; process.stdout.write(isFrozenAliasMajor(process.env.MAJOR) ? "true" : "false");')
          if [ "$FROZEN" = "true" ]; then
            echo "::notice::v0 aliases stay frozen; not moving v0 or v0.$MINOR"
            exit 0
          fi
          for ALIAS in "v$MAJOR" "v$MAJOR.$MINOR"; do
            if git ls-remote --exit-code --tags origin "refs/tags/$ALIAS" >/dev/null 2>&1; then
              git fetch --depth=1 --no-tags origin "refs/tags/$ALIAS:refs/tags/$ALIAS"
              ALIAS_COMMIT=$(git rev-parse "refs/tags/$ALIAS^{commit}")
              CURRENT_VERSION=$(git show "$ALIAS_COMMIT:package.json" | node -p "JSON.parse(require('fs').readFileSync(0, 'utf8')).version")
              DECISION=$(CURRENT_VERSION="$CURRENT_VERSION" CANDIDATE_VERSION="$VERSION" node --input-type=module -e 'import { decideAliasVersion } from "./scripts/verify-release-artifacts.mjs"; const decision = decideAliasVersion({ currentVersion: process.env.CURRENT_VERSION, candidateVersion: process.env.CANDIDATE_VERSION }); process.stdout.write(decision.action);')
              if [ "$DECISION" = "skip" ]; then
                echo "::notice::$ALIAS already points to newer $CURRENT_VERSION; not moving"
                continue
              fi
            fi
            git tag -fa "$ALIAS" -m "Rolling $ALIAS alias -> $GITHUB_REF_NAME" "${GITHUB_SHA}^{commit}"
            git push origin "refs/tags/$ALIAS" --force
          done
