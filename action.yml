name: 'Postman Onboarding: Azure Spec Discovery'
description: Discover Azure-hosted API specs and expose a spec path for Postman onboarding. Part of the Postman API Onboarding suite.
author: Postman
branding:
  icon: cloud
  color: orange
inputs:
  mode:
    description: 'Discovery mode: resolve-one selects the single best service for this repository; discover-many exports every exportable candidate; discover-estate enumerates repo-associated Azure resources across the subscription without exporting specs.'
    required: false
    default: resolve-one
  subscription-id:
    description: Optional Azure subscription ID used as the discovery enumeration root. When omitted, the single enabled subscription visible to the credential is used; multiple enabled subscriptions require this input.
    required: false
    default: ''
  resource-group:
    description: Optional resource group that scopes discovery to one group instead of the whole subscription.
    required: false
    default: ''
  api-id:
    description: Optional full APIM API ARM resource ID for this service. Use this to bypass broader subscription discovery. Supports historical revisions via ;rev=N.
    required: false
    default: ''
  environment:
    description: Optional deployment environment selector used to disambiguate APIs that share a repository association across environments.
    required: false
    default: ''
  gateway-id:
    description: Optional self-hosted or workspace gateway id used to narrow APIM API candidates. The value "managed" is rejected.
    required: false
    default: ''
  api-version:
    description: Optional APIM API version selector used when multiple versions share the same path or repository association.
    required: false
    default: ''
  api-revision:
    description: Optional APIM API revision selector used when multiple revisions remain after other evidence.
    required: false
    default: ''
  api-center-definition-id:
    description: Optional full Azure API Center definition ARM resource ID. Exact match only; conflicts with a different .postman apiCenterDefinitionId binding.
    required: false
    default: ''
  output-dir:
    description: Directory under the repository root where generated specs are written.
    required: false
    default: discovered-specs
  postman-api-key:
    description: Optional service-account PMAK used to mint or re-mint a postman-access-token for telemetry enrichment (account_type). Not used for any Azure or Postman asset operation.
    required: false
    default: ''
  postman-access-token:
    description: Optional Postman service-account access token, used only to enrich anonymous telemetry with the session account_type. When omitted, postman-api-key alone can mint one for the same purpose. Not used for any Azure or Postman asset operation.
    required: false
    default: ''
  enable-logic-apps-list-swagger:
    description: Opt-in Consumption Logic Apps native listSwagger POST. Default false. When denied or capability-absent, falls back to Reader-only Request-trigger synthesis unless require-logic-apps-native-swagger is true.
    required: false
    default: 'false'
  require-logic-apps-native-swagger:
    description: When true with enable-logic-apps-list-swagger, a permanent malformed native listSwagger response fails instead of silently synthesizing. Default false.
    required: false
    default: 'false'
  enable-app-service-scm-spec-fetch:
    description: Opt-in retrieval of App Service aiIntegration.ApiSpecPath bytes through the site SCM/VFS endpoint. Default false. Metadata is still surfaced when the path is present.
    required: false
    default: 'false'
  enable-functions-openapi-extension:
    description: Opt-in detection/export of Azure Functions OpenAPI extension endpoints evidenced by function metadata or an explicit declared path. Default false. Never lists host/function keys.
    required: false
    default: 'false'
  enable-runtime-declared-spec-routes:
    description: Opt-in provider for explicitly declared HTTPS specification URLs on App Service, Functions, Container Apps, Static Web Apps, ACI, and AKS workloads. Default false. No blind common-path probing.
    required: false
    default: 'false'
  runtime-declared-spec-targets-json:
    description: JSON array of explicit runtime-declared specification targets when enable-runtime-declared-spec-routes is true. Each entry requires id, name, workloadKind, and https url.
    required: false
    default: '[]'
outputs:
  resolution-json:
    description: JSON resolution result describing status, source type, confidence, and evidence.
  resolution-status:
    description: 'Resolution status: resolved or unresolved.'
  source-type:
    description: 'Resolved source type: repo-spec, apim-export, api-center-export, app-service-api-definition, iac-embedded, custom-api-swagger, logic-apps-workflow, template-spec-embedded, event-grid-webhook, service-bus-topic, function-bindings-trigger, runtime-declared-spec, manual-review, discover-many, or discover-estate.'
  mapping-confidence:
    description: Numeric confidence score for the selected service candidate.
  spec-path:
    description: Path to the resolved or generated specification when available.
  api-id:
    description: Full APIM API ARM resource ID or API Center definition ARM resource ID when those providers resolve; empty for App Service or IaC-local resolutions.
  service-name:
    description: Resolved service name.
  services-json:
    description: 'discover-many output: JSON array of exported services.'
  service-count:
    description: 'discover-many output: number of exported services.'
  export-summary-json:
    description: JSON summary of attempted, exported, failed, and skipped candidates.
  candidates-json:
    description: Ranked ambiguous candidates as JSON when resolution is unresolved with at least two candidates; empty otherwise.
  provider-type:
    description: 'Provider that produced the resolved spec: apim, api-center, app-service, iac-local, custom-apis, logic-apps, template-specs, event-grid, service-bus, function-bindings, or runtime-declared.'
  spec-format:
    description: 'Format of the resolved spec: openapi-yaml, openapi-json, asyncapi-yaml, asyncapi-json, wsdl, wadl, xsd, protobuf, or graphql-sdl.'
  contract-origin:
    description: Compatibility output; always empty in v1.
  contract-metadata-path:
    description: Compatibility output; always empty in v1.
  variant-count:
    description: Compatibility output; always empty in v1.
  derived-openapi-path:
    description: Path to the derived OpenAPI 3.x document when the source was not already OpenAPI 3.x.
  derived-openapi-version:
    description: 'OpenAPI version of the derived document: 3.0.3 or 3.1.0.'
  derived-openapi-completeness:
    description: Whether the derived OpenAPI document is full or partial.
  derived-openapi-format:
    description: 'Serialization format of the derived OpenAPI document: openapi-json.'
  derived-openapi-evidence-json:
    description: JSON array of evidence strings describing how the derived OpenAPI document was produced.
  narrowing-strategy:
    description: 'Narrowing tier that produced the candidate ordering: gateway-host-path, tag-prefilter, gateway-assignment, iac-fingerprint, rg-correlation, naming-heuristic, or none.'
  repos-json:
    description: 'discover-estate output: JSON array of deduped org/repo associations discovered from repo tags across the subscription; empty otherwise.'
  repo-count:
    description: 'discover-estate output: number of deduped org/repo associations; empty otherwise.'
runs:
  using: node24
  main: dist/index.cjs
